<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
</head>

<body>

    <div id="chat-container">
        <div id="message-list">
            <!-- list will contain messages -->
        </div>
        <div id="user-list">


        </div>
        <input type="text" id="user-input">
        <input type="text" id="message-input">
        <button id="send-message">Send</button>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>

    <script>
        // socket code in js.

        const socket = io.connect('http://localhost:3000');

        const userList = document.getElementById("user-list");
        const username = prompt('Enter your name');
        // emit the username to the server
        socket.emit("join", username);

        if (username) {
            const user = username;
            const userButton = document.createElement("button");
            userButton.innerText = user;
            userList.appendChild(userButton);
        }

        // get the elements
        const userInput = document.getElementById("user-input");
        const messageInput = document.getElementById("message-input");
        const messageList = document.getElementById("message-list");
        const sendButton = document.getElementById("send-message");

        sendButton.addEventListener('click', function () {
            // read the message from input and send to server.
            const sender = userInput.value;
            const message = messageInput.value;
            if (message && sender) {
                socket.emit('new_message', { sender, message }); // Emitting the message to the server

                // add message to the list 
                const messageElement = document.createElement("div");
                messageElement.innerText = username + sender + ": " + message;
                messageList.appendChild(messageElement);

                //  Reset the value of textbox to empty
                messageInput.value = '';
            }
        });

        // Display messages on the UI.

        socket.on('load_messages', (messages) => {
            messages.forEach(message => {
                const messageElement = document.createElement("div");
                messageElement.innerText = new Date(message.timestamp).toDateString() + "-" + message.username + ":" + message.message;
                messageList.appendChild(messageElement);

            });
        })

        // Listen for broadcast message, and add it to the list.
        socket.on('broadcast_message', (userMessage) => {
            const messageElement = document.createElement("div");
            messageElement.innerText = userMessage.username + ":" + userMessage.message;
            messageList.appendChild(messageElement);
        })

        socket.on("button-list", (userMessage) => {
                const userButton = document.createElement("button");
                userButton.innerText = userMessage.username;
                userList.appendChild(userButton);
            })

    </script>
</body>

</html>
