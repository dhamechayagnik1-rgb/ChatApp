<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Chat UI</title>
<link rel="stylesheet" href="desktop.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="top-bar">
      <h2>Messages</h2>
      <span>🔍</span>
    </div>

    <input class="search" placeholder="Search...">

    <div class="user">
      <img src="https://i.pravatar.cc/100?img=1">
      <div class="user-info">
        <h4>Danny Hopkins</h4>
        <p>Will do, super, thank you ❤️</p>
      </div>
      <div class="time">08:43</div>
    </div>

    <div class="user">
      <img src="https://i.pravatar.cc/100?img=2">
      <div class="user-info">
        <h4>Bobby Langford</h4>
        <p>Uploaded file.</p>
      </div>
      <div class="time">Tue</div>
    </div>

  </div>

  <!-- Chat -->
  <div class="chat">

    <div class="chat-header">
      <img src="https://i.pravatar.cc/100?img=1">
      <div>
        <h4>Danny Hopkins</h4>
        <div class="status">Online</div>
      </div>
    </div>

    <div class="messages">
      
    </div>

    <div class="input">
      <input type="text" placeholder="Message">
      <button>➤</button>
    </div>

  </div>

</div>
